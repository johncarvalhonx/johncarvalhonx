<svg viewBox="0 0 1200 30" width="1200" height="30" fill="none" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39D353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#39D353" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="40" y1="15" x2="1160" y2="15" stroke="url(#dl)" stroke-width="1.5"/>
  <circle cx="500" cy="15" r="2" fill="#39D353" opacity="0.6"/>
  <circle cx="700" cy="15" r="2" fill="#22D3EE" opacity="0.6"/>
  <g transform="translate(600,15) rotate(45)" filter="url(#dg)">
    <rect x="-5" y="-5" width="10" height="10" fill="#6EE7F9"/>
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.6s" repeatCount="indefinite"/>
  </g>
</svg>
