<svg viewBox="0 0 1280 340" width="1280" height="340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="João Carvalho — Analista de Sistemas · Backend, APIs e Integrações">
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="115%">
      <stop offset="0%" stop-color="#0E1B30"/>
      <stop offset="58%" stop-color="#0A1322"/>
      <stop offset="100%" stop-color="#05080F"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#39D353"/>
      <stop offset="55%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39D353"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39D353" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#39D353" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.4" fill="#3CF0A0" opacity="0.07"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1280" height="340" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="340" rx="22" fill="url(#dots)"/>

  <!-- atmosphere -->
  <circle cx="160" cy="60" r="280" fill="url(#orbG)"/>
  <circle cx="1140" cy="300" r="320" fill="url(#orbC)"/>

  <!-- frame edges -->
  <rect x="0" y="0" width="1280" height="340" rx="22" fill="none" stroke="#1B2A45" stroke-width="1.5"/>
  <rect x="40" y="2.5" width="420" height="2" rx="1" fill="url(#line)" opacity="0.8"/>

  <!-- HUD corner brackets -->
  <g stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M24 56 L24 26 L54 26"/>
    <path d="M1256 56 L1256 26 L1226 26"/>
    <path d="M24 284 L24 314 L54 314"/>
    <path d="M1256 284 L1256 314 L1226 314"/>
  </g>

  <!-- scanline -->
  <rect x="14" width="1252" height="2" fill="#39D353" opacity="0.12">
    <animate attributeName="y" values="20;320;20" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.16;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- floating particles -->
  <g fill="#22D3EE">
    <circle cx="520" cy="70" r="2" opacity="0.6"><animate attributeName="cy" values="70;58;70" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="120" r="1.6" opacity="0.45"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="150" r="1.6" fill="#39D353" opacity="0.5"><animate attributeName="cy" values="150;140;150" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="80" r="2" fill="#39D353" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- terminal prompt -->
  <text x="70" y="86" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="20" font-weight="600">
    <tspan fill="#22D3EE">joao@github</tspan><tspan fill="#5B6B86">:</tspan><tspan fill="#39D353">~</tspan><tspan fill="#5B6B86">$</tspan><tspan fill="#93A4C3"> ./whoami</tspan><tspan fill="#39D353" dx="3">█<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></tspan>
  </text>

  <!-- name -->
  <text x="68" y="200" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="82" font-weight="800" letter-spacing="4" fill="url(#neon)" filter="url(#glow)">JOÃO CARVALHO</text>

  <!-- accent underline -->
  <rect x="72" y="220" width="300" height="3" rx="1.5" fill="url(#line)" filter="url(#softglow)"/>
  <circle cx="72" cy="221.5" r="4" fill="#6EE7F9" filter="url(#glow)">
    <animate attributeName="cx" values="80;360;80" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- role -->
  <text x="72" y="262" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="21" font-weight="500" letter-spacing="1">
    <tspan fill="#C7D2E5">ANALISTA DE SISTEMAS</tspan><tspan fill="#39D353">  //  </tspan><tspan fill="#8FA1BE">BACKEND · APIs · INTEGRAÇÕES</tspan>
  </text>

  <!-- tech chips -->
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13" font-weight="600">
    <g><rect x="72" y="300" width="92" height="26" rx="13" fill="none" stroke="#39D353" stroke-opacity="0.55"/><text x="118" y="317" text-anchor="middle" fill="#9FE6B4">Python</text></g>
    <g><rect x="176" y="300" width="100" height="26" rx="13" fill="none" stroke="#22D3EE" stroke-opacity="0.5"/><text x="226" y="317" text-anchor="middle" fill="#9EDFEE">FastAPI</text></g>
    <g><rect x="288" y="300" width="92" height="26" rx="13" fill="none" stroke="#39D353" stroke-opacity="0.55"/><text x="334" y="317" text-anchor="middle" fill="#9FE6B4">Docker</text></g>
    <g><rect x="392" y="300" width="82" height="26" rx="13" fill="none" stroke="#22D3EE" stroke-opacity="0.5"/><text x="433" y="317" text-anchor="middle" fill="#9EDFEE">CI/CD</text></g>
  </g>

  <!-- radar / node cluster -->
  <g transform="translate(1080,168)">
    <circle r="112" fill="none" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.10"/>
    <circle r="78" fill="none" stroke="#39D353" stroke-width="1" stroke-opacity="0.16"/>
    <circle r="44" fill="none" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.22"/>
    <!-- expanding ping -->
    <circle r="20" fill="none" stroke="#39D353" stroke-width="1.5">
      <animate attributeName="r" values="14;118;14" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- orbiting dot -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="9s" repeatCount="indefinite"/>
      <circle cx="78" cy="0" r="3.5" fill="#6EE7F9" filter="url(#glow)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
      <circle cx="44" cy="0" r="2.6" fill="#39D353"/>
    </g>
    <!-- nodes on rings -->
    <circle cx="112" cy="0" r="2.4" fill="#22D3EE" opacity="0.7"/>
    <circle cx="-78" cy="0" r="2.2" fill="#39D353" opacity="0.6"/>
    <circle cx="0" cy="-44" r="2.2" fill="#6EE7F9" opacity="0.6"/>
    <!-- core -->
    <circle r="8" fill="#0A1322" stroke="#39D353" stroke-width="1.5"/>
    <circle r="4.5" fill="#39D353" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
