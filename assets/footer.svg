<svg viewBox="0 0 1280 150" width="1280" height="150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vamos construir algo juntos · São Paulo, Brasil · Aberto a novas oportunidades">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#0E1B30"/>
      <stop offset="100%" stop-color="#05080F"/>
    </radialGradient>
    <linearGradient id="fneon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39D353"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="ftrace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39D353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39D353" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fdots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.4" fill="#3CF0A0" opacity="0.06"/>
    </pattern>
    <filter id="fglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="150" rx="22" fill="url(#fbg)"/>
  <rect x="0" y="0" width="1280" height="150" rx="22" fill="url(#fdots)"/>
  <rect x="0" y="0" width="1280" height="150" rx="22" fill="none" stroke="#1B2A45" stroke-width="1.5"/>

  <!-- corner brackets -->
  <g stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M24 52 L24 26 L54 26"/>
    <path d="M1256 52 L1256 26 L1226 26"/>
    <path d="M24 124 L24 98 L54 98"/>
    <path d="M1256 124 L1256 98 L1226 98"/>
  </g>

  <!-- circuit trace with moving pulse -->
  <line x1="120" y1="40" x2="1160" y2="40" stroke="url(#ftrace)" stroke-width="1.5"/>
  <g fill="#39D353" opacity="0.55">
    <circle cx="120" cy="40" r="2.5"/><circle cx="430" cy="40" r="2"/><circle cx="850" cy="40" r="2"/><circle cx="1160" cy="40" r="2.5"/>
  </g>
  <circle cy="40" r="3.5" fill="#6EE7F9" filter="url(#fglow)">
    <animate attributeName="cx" values="120;1160;120" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- main text -->
  <text x="640" y="92" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="27" font-weight="800" letter-spacing="2" fill="url(#fneon)" filter="url(#fglow)">VAMOS CONSTRUIR ALGO JUNTOS</text>

  <!-- subtitle -->
  <text x="640" y="120" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13.5" font-weight="500" letter-spacing="1" fill="#8FA1BE">São Paulo · Brasil   //   aberto a novas oportunidades</text>
</svg>
